<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ForFuture — Password</title>
    <!--
      Public URL: https://forfuture.app/password-reset-web.html
      Allow-list in Supabase → Authentication → Redirect URLs (exact string).
      Used for password-recovery links from the app (Forgot password).
    -->
    <link rel="icon" href="images/favicon.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="images/favicon-512.png" type="image/png" sizes="512x512" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" sizes="180x180" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="auth-page.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo" aria-label="ForFuture">
          <img src="images/forfuture-wordmark-dark.png" alt="ForFuture" class="logo-wordmark-header" width="200" height="32" />
        </a>
        <div class="header-actions">
          <div class="lang-switch" role="group" aria-label="Sprache wählen">
            <button type="button" class="lang-switch-btn is-active" data-lang="de" aria-pressed="true">DE</button>
            <button type="button" class="lang-switch-btn" data-lang="en" aria-pressed="false">EN</button>
          </div>
        </div>
      </div>
    </header>
    <main class="auth-main">
      <div class="auth-card">
      <h1 id="headline">ForFuture</h1>
      <p class="lead" id="lead"></p>
      <p id="msg" hidden></p>

      <div id="invalid-panel" hidden>
        <p id="invalid-text"></p>
      </div>

      <div id="success-panel" hidden>
        <p class="ok" id="success-text"></p>
      </div>

      <div id="actions" class="auth-actions" hidden></div>

      <form id="reset-form" hidden>
        <div class="field">
          <label for="new-password" id="label-new"></label>
          <input
            type="password"
            id="new-password"
            name="newPassword"
            minlength="8"
            required
            autocomplete="new-password"
          />
          <p class="hint" id="pw-hint"></p>
          <p class="err hidden" id="password-error" hidden></p>
        </div>
        <div class="field">
          <label for="confirm-password" id="label-confirm"></label>
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            minlength="8"
            required
            autocomplete="new-password"
          />
          <p class="err hidden" id="confirm-error" hidden></p>
        </div>
        <button type="submit" id="submit-button"></button>
      </form>

      <p class="muted" id="foot" hidden></p>
      </div>
    </main>
    <script src="auth-page.js"></script>
    <script type="module">
      const MIN_PASSWORD_LENGTH = 8;
      const lang = window.ForFutureAuth?.detectLang?.() ?? (navigator.language.toLowerCase().startsWith('de') ? 'de' : 'en');
      const de = lang === 'de';
      const $ = (id) => document.getElementById(id);

      /** Public anon keys — safe to embed; must match the Supabase project that sent the email. */
      const ANON_BY_HOST = {
        'sxrngcrgrpsjajggtoam.supabase.co':
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4cm5nY3JncnBzamFqZ2d0b2FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Nzg3MTUsImV4cCI6MjA5NjM1NDcxNX0.Xwv-kYkXO1AYirGyq34BwN0rl0-Yu6qqxKdNqT2VLNk',
        'lulnjwqvpwsxyylzjybp.supabase.co':
          'sb_publishable_t2U0QfJ9lhyxhIfSAGuBQA_jqc2mSjm',
      };

      const copy = de
        ? {
            title: 'Passwort zurücksetzen',
            lead: 'Wähle ein neues Passwort für dein ForFuture-Konto.',
            labelNew: 'Neues Passwort',
            labelConfirm: 'Passwort bestätigen',
            pwHint: `Mindestens ${MIN_PASSWORD_LENGTH} Zeichen.`,
            submit: 'Passwort speichern',
            submitting: 'Wird gespeichert…',
            mismatch: 'Die Passwörter stimmen nicht überein.',
            tooShort: `Das Passwort muss mindestens ${MIN_PASSWORD_LENGTH} Zeichen lang sein.`,
            success:
              'Dein Passwort wurde geändert. Du kannst dich jetzt in der ForFuture-App anmelden.',
            openApp: 'App öffnen',
            invalid:
              'Der Link ist ungültig oder abgelaufen. Fordere in der App unter „Passwort vergessen“ einen neuen Link an.',
            noSession:
              'Es konnte keine Sitzung aus dem Link gelesen werden. Öffne den Link erneut im Browser oder fordere einen neuen an.',
            footInvalid:
              'Falls die App nicht startet, öffne ForFuture manuell und tippe auf „Passwort vergessen“.',
            footSuccess:
              'Falls die App nicht startet, öffne ForFuture manuell und melde dich mit E-Mail und neuem Passwort an.',
            footConfig:
              'Stelle sicher, dass https://forfuture.app/password-reset-web.html in Supabase unter „Redirect URLs“ eingetragen ist.',
            expired: 'Dieser Link ist abgelaufen. Bitte fordere einen neuen Link an.',
            genericFail: 'Passwort konnte nicht gespeichert werden. Bitte erneut versuchen.',
            networkFail:
              'Verbindung zum Server fehlgeschlagen. Prüfe deine Internetverbindung und versuche es erneut.',
          }
        : {
            title: 'Reset password',
            lead: 'Choose a new password for your ForFuture account.',
            labelNew: 'New password',
            labelConfirm: 'Confirm password',
            pwHint: `At least ${MIN_PASSWORD_LENGTH} characters.`,
            submit: 'Save password',
            submitting: 'Saving…',
            mismatch: 'Passwords do not match.',
            tooShort: `Password must be at least ${MIN_PASSWORD_LENGTH} characters long.`,
            success: 'Your password has been changed. You can now sign in to the ForFuture app.',
            openApp: 'Open app',
            invalid:
              'This link is invalid or has expired. Use “Forgot password” in the app to request a new link.',
            noSession:
              'No session was read from this link. Open the link again in your browser or request a new one.',
            footInvalid:
              'If the app does not open, launch ForFuture manually and tap “Forgot password”.',
            footSuccess:
              'If the app does not open, launch ForFuture manually and sign in with your email and new password.',
            footConfig:
              'Ensure https://forfuture.app/password-reset-web.html is listed under Supabase → Redirect URLs.',
            expired: 'This link has expired. Please request a new reset link.',
            genericFail: 'Could not save password. Please try again.',
            networkFail:
              'Could not reach the server. Check your internet connection and try again.',
          };

      document.title = de ? 'ForFuture — Passwort' : 'ForFuture — Password';
      $('headline').textContent = copy.title;
      $('lead').textContent = copy.lead;
      $('label-new').textContent = copy.labelNew;
      $('label-confirm').textContent = copy.labelConfirm;
      $('pw-hint').textContent = copy.pwHint;
      $('submit-button').textContent = copy.submit;

      function showOpenApp() {
        const actions = $('actions');
        actions.innerHTML = '';
        const open = document.createElement('a');
        open.href = 'forfuture2://';
        open.className = 'btn';
        open.textContent = copy.openApp;
        actions.appendChild(open);
        actions.hidden = false;
      }

      function hideEl(el) {
        el.hidden = true;
        el.classList.add('hidden');
      }

      function showEl(el) {
        el.hidden = false;
        el.classList.remove('hidden');
      }

      function supabaseHostFromJwt(token) {
        try {
          const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
          const iss = payload.iss ?? '';
          const match = iss.match(/^https:\/\/([^.]+\.supabase\.co)\/auth\/v1$/);
          return match ? match[1] : null;
        } catch {
          return null;
        }
      }

      function resolveSupabaseConfig(accessToken) {
        const host = accessToken ? supabaseHostFromJwt(accessToken) : null;
        if (host && ANON_BY_HOST[host]) {
          return { url: `https://${host}`, anon: ANON_BY_HOST[host] };
        }
        return {
          url: 'https://lulnjwqvpwsxyylzjybp.supabase.co',
          anon: ANON_BY_HOST['lulnjwqvpwsxyylzjybp.supabase.co'],
        };
      }

      function friendlyError(message) {
        const text = String(message || '').toLowerCase();
        if (text.includes('failed to fetch') || text.includes('networkerror') || text.includes('load failed')) {
          return copy.networkFail;
        }
        if (text.includes('expired') || text.includes('invalid') || text.includes('token')) {
          return copy.expired;
        }
        return message || copy.genericFail;
      }

      function showInvalid(body, foot) {
        hideEl($('lead'));
        hideEl($('reset-form'));
        showEl($('invalid-panel'));
        $('invalid-text').textContent = body;
        $('foot').textContent = foot;
        showEl($('foot'));
        showOpenApp();
      }

      function showSuccess() {
        hideEl($('lead'));
        hideEl($('reset-form'));
        showEl($('success-panel'));
        $('success-text').textContent = copy.success;
        $('foot').textContent = copy.footSuccess;
        showEl($('foot'));
        showOpenApp();
      }

      function showFieldError(el, message) {
        el.textContent = message;
        showEl(el);
      }

      function clearFieldErrors() {
        for (const id of ['password-error', 'confirm-error']) {
          const el = $(id);
          el.textContent = '';
          hideEl(el);
        }
      }

      async function main() {
        const hash = window.location.hash?.replace(/^#/, '') ?? '';
        const hashParams = new URLSearchParams(hash);
        const qParams = new URLSearchParams(window.location.search);
        const accessToken = hashParams.get('access_token');
        const err =
          hashParams.get('error') ||
          hashParams.get('error_code') ||
          qParams.get('error') ||
          qParams.get('error_description');

        if (err) {
          showInvalid(
            hashParams.get('error_description') ||
              qParams.get('error_description') ||
              err ||
              copy.invalid,
            copy.footInvalid,
          );
          return;
        }

        const { url: sbUrl, anon: sbAnon } = resolveSupabaseConfig(accessToken);
        const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2.49.4');
        const supabase = createClient(sbUrl, sbAnon, {
          auth: { detectSessionInUrl: true, persistSession: false },
        });

        const code = qParams.get('code');
        if (code) {
          const { error: exErr } = await supabase.auth.exchangeCodeForSession(window.location.href);
          if (exErr) {
            showInvalid(friendlyError(exErr.message), copy.footInvalid);
            return;
          }
        } else if (accessToken) {
          const refreshToken = hashParams.get('refresh_token') ?? '';
          const { error: sessionError } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });
          if (sessionError) {
            showInvalid(friendlyError(sessionError.message), copy.footInvalid);
            return;
          }
        }

        const {
          data: { session },
          error: sessErr,
        } = await supabase.auth.getSession();
        if (sessErr) {
          showInvalid(friendlyError(sessErr.message), copy.footInvalid);
          return;
        }
        if (!session) {
          showInvalid(copy.noSession, copy.footConfig);
          return;
        }

        $('reset-form').removeAttribute('hidden');
        $('reset-form').classList.remove('hidden');

        $('reset-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          clearFieldErrors();

          const newPassword = $('new-password').value;
          const confirmPassword = $('confirm-password').value;

          if (newPassword.length < MIN_PASSWORD_LENGTH) {
            showFieldError($('password-error'), copy.tooShort);
            return;
          }
          if (newPassword !== confirmPassword) {
            showFieldError($('confirm-error'), copy.mismatch);
            return;
          }

          const submitButton = $('submit-button');
          submitButton.disabled = true;
          submitButton.textContent = copy.submitting;

          try {
            const { data, error: updateError } = await supabase.auth.updateUser({
              password: newPassword,
            });
            if (updateError) throw updateError;
            if (!data.user) throw new Error(copy.genericFail);
            showSuccess();
          } catch (error) {
            const message = friendlyError(error instanceof Error ? error.message : copy.genericFail);
            showFieldError($('password-error'), message);
            submitButton.disabled = false;
            submitButton.textContent = copy.submit;
          }
        });
      }

      void main().catch(() => {
        showInvalid(copy.genericFail, copy.footConfig);
      });
    </script>
  </body>
</html>
